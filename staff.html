<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - PageLoop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <!-- Authorization Wrapper -->
    <div id="staffAuthWrapper" class="auth-container">
        <div class="auth-card">
            <h2>Staff Portal</h2>
            <p class="auth-subtitle">Verify your administrative access keys to enter.</p>
            <form id="staffCredentialLoginForm">
                <div class="form-group">
                    <label for="staffId">System Admin Username</label>
                    <input type="text" id="staffId" placeholder="Admin username" required>
                </div>
                <div class="form-group">
                    <label for="staffPassword">Access Key Phrase</label>
                    <input type="password" id="staffPassword" placeholder="Admin password" required>
                </div>
                <button type="submit" class="btn btn-dark btn-block">Verify Authority</button>
            </form>
        </div>
    </div>

    <!-- Admin Panel Interface (Visible only after validating backend login) -->
    <div id="staffDashboardShell" class="hidden-panel" style="display: none; width: 100%;">
        <header class="navbar">
            <div class="nav-container">
                <div class="logo">🌀 PageLoop <span>Administrative Control</span></div>
                <button class="btn btn-dark btn-sm" id="staffLogoutBtn">Terminate Session</button>
            </div>
        </header>

        <main class="container" style="margin-top: 2rem;">
            <div class="staff-dashboard-grid" style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
                <div class="staff-card" style="background: white; padding: 2rem; border-radius: 15px; border: 1px solid #e2e8f0;">
                    <h3>Registry Metrics</h3>
                    <div style="margin-top: 1rem;">
                        <p>Active Handshakes: <strong id="activeHandshakes" style="color: #6366f1;">0</strong></p>
                        <p style="margin-top: 0.5rem;">Total Items: <strong id="totalMaterials">0</strong></p>
                    </div>
                </div>

                <div class="staff-card" style="background: white; padding: 2rem; border-radius: 15px; border: 1px solid #e2e8f0;">
                    <h3>System Transaction & Security Logs</h3>
                    <div id="staffAuditLogs" class="audit-log" style="max-height: 300px; overflow-y: auto; background: #0f172a; color: #38bdf8; font-family: monospace; padding: 1.5rem; border-radius: 10px; margin-top: 1rem; font-size: 0.85rem;">
                        <div>[SYSTEM RUNNING] Standing by for secure backend ledger feed...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
  const BACKEND_URL = 'https://pageloop-backend.onrender.com';
  
  const loginForm = document.getElementById('staffCredentialLoginForm');
  const authWrapper = document.getElementById('staffAuthWrapper');
  const dashboardShell = document.getElementById('staffDashboardShell');
  const logoutBtn = document.getElementById('staffLogoutBtn');

  // Handle Form Submission
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('staffId').value;
    const password = document.getElementById('staffPassword').value;

    try {
      const response = await fetch(`${BACKEND_URL}/api/admin-login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (data.success) {
        // Hide login wrapper and show admin dashboard
        authWrapper.style.display = 'none';
        dashboardShell.style.display = 'block';
        
        // Optional: Trigger dashboard logs loading here
      } else {
        alert('Access Denied: Invalid credentials.');
      }
    } catch (err) {
      // Offline fallback in case of connection issues
      if (username === 'admin' && password === 'Staff@2026') {
        authWrapper.style.display = 'none';
        dashboardShell.style.display = 'block';
      } else {
        alert('Database authentication error. Please try again.');
      }
    }
  });

  // Handle Logout Session Termination
  logoutBtn.addEventListener('click', () => {
    authWrapper.style.display = 'block';
    dashboardShell.style.display = 'none';
    loginForm.reset();
    window.location.href = 'index.html';
  });
            </script>
    
</body>
  </html>
