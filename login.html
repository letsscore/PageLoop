<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageLoop Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #4F46E5; color: white; border: none; font-weight: bold; cursor: pointer; }
        .row { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Access Gateway</h2>
        <form id="loginForm">
            <select id="accountType"><option>Buyer Portal</option><option>Seller Portal</option></select>
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="date" id="dob" required>
            <div class="row">
                <input type="email" id="email" placeholder="Email Address" required>
                <button type="button" id="sendOtpBtn">Send OTP</button>
            </div>
            <input type="text" id="otpInput" placeholder="Enter OTP" maxlength="6" required>
            <input type="text" id="pinCode" placeholder="PIN Code" required>
            <select id="academicStatus"><option>Student</option><option>Professional</option></select>
            <button type="submit">Authenticate Secure Access</button>
        </form>
    </div>

    <script>
        const API = 'https://pageloop-backend.onrender.com';

        document.getElementById('sendOtpBtn').onclick = async () => {
            const data = {
                email: document.getElementById('email').value,
                fullName: document.getElementById('fullName').value,
                dob: document.getElementById('dob').value,
                pinCode: document.getElementById('pinCode').value,
                academicStatus: document.getElementById('academicStatus').value,
                accountType: document.getElementById('accountType').value
            };
            const res = await fetch(`${API}/api/send-otp`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            if((await res.json()).success) alert('OTP Sent!');
        };

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${API}/api/verify-otp`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('email').value, otp: document.getElementById('otpInput').value })
            });
            if((await res.json()).success) alert('Access Authorized!');
            else alert('Invalid OTP');
        };
    </script>
</body>
</html>
