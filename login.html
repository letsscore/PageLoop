<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageLoop - Access Verification</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f19; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-card { background: rgba(22, 30, 49, 0.8); border: 1px solid rgba(255,255,255,0.08); padding: 40px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 100%; max-width: 440px; backdrop-filter: blur(12px); color: white; }
        h2 { text-align: center; margin: 0 0 30px 0; font-size: 26px; font-weight: 700; color: #38bdf8; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; box-sizing: border-box; font-size: 14px; color: white; transition: all 0.2s; }
        input:focus, select:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.2); }
        button { width: 100%; padding: 14px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-top: 15px; }
        button:hover { background: #4338ca; transform: translateY(-1px); }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .status-msg { text-align: center; margin-top: 20px; font-weight: 600; font-size: 14px; min-height: 20px; }
        .success { color: #34d399; }
        .error { color: #f87171; }
        .staff-link { text-align: center; margin-top: 25px; font-size: 12px; color: #475569; }
        .staff-link a { color: #64748b; text-decoration: none; font-weight: bold; }
        .staff-link a:hover { color: #38bdf8; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Access Portal</h2>
    <form id="accessForm">
        <div class="input-group">
            <label>Portal Destination</label>
            <select id="accountType" required>
                <option value="Student Dashboard">Student Marketplace / Buyer</option>
                <option value="Seller Portal">Verified Seller Workspace</option>
            </select>
        </div>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter registration name" required>
        </div>

        <div class="input-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@domain.com" required>
        </div>

        <div class="input-group">
            <label>6-Digit PIN Code</label>
            <input type="text" id="pinCode" pattern="[0-9]{6}" placeholder="e.g. 785684" required>
        </div>

        <div class="input-group">
            <label>Academic Status</label>
            <select id="academicStatus" required>
                <option value="Student">Student / Learner</option>
                <option value="Teacher">Teacher / Educator</option>
                <option value="Graduate">Graduate Analyst</option>
            </select>
        </div>

        <button type="submit" id="submitBtn">Access Platform</button>
    </form>
    
    <div id="statusMessage" class="status-msg"></div>

    <div class="staff-link">
        Internal Management? <a href="staff.html">Authorize Staff Desk</a>
    </div>
</div>

<script>
    const BACKEND_URL = "https://pageloop-backend.onrender.com";

    document.getElementById('accessForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        submitBtn.disabled = true;
        submitBtn.innerText = "Connecting to Secure Ledger...";
        statusMessage.className = "status-msg";
        statusMessage.innerText = "";

        const payload = {
            accountType: document.getElementById('accountType').value,
            fullName: document.getElementById('fullName').value,
            dob: document.getElementById('dob').value,
            email: document.getElementById('email').value,
            pinCode: document.getElementById('pinCode').value,
            academicStatus: document.getElementById('academicStatus').value
        };

        try {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 12000); 

            // FIX: Template literal backticks implemented correctly here
            const response = await fetch(`${BACKEND_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                signal: controller.signal
            });
            clearTimeout(id);

            const data = await response.json();

            if (data.success) {
                statusMessage.className = "status-msg success";
                statusMessage.innerText = "Authorized successfully! Routing session...";
                localStorage.setItem('userEmail', data.email);

                setTimeout(() => {
                    if (data.accountType === "Seller Portal") {
                        window.location.href = data.isPlatformPaid ? "seller.html" : "payment.html";
                    } else {
                        window.location.href = "buyer.html";
                    }
                }, 1000);
            } else {
                throw new Error(data.message || "Database profile registration refused.");
            }

        } catch (err) {
            statusMessage.className = "status-msg error";
            if(err.name === 'AbortError') {
                statusMessage.innerText = "Server wakeup latency detected. Please tap submit again.";
            } else {
                statusMessage.innerText = err.message || "Unable to contact secure background microservice.";
            }
            submitBtn.disabled = false;
            submitBtn.innerText = "Access Platform";
        }
    });
</script>

</body>
    </html>
