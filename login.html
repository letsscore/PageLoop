<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageLoop - Access Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { background: #ffffff; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 440px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 25px; font-size: 24px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #475569; font-size: 14px; }
        input, select { width: 100%; padding: 11px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; color: #334155; }
        input:focus, select:focus { outline: none; border-color: #4f46e5; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #4338ca; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .status-msg { text-align: center; margin-top: 15px; font-weight: 600; font-size: 14px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Access Portal</h2>
    <form id="accessForm">
        <div class="input-group">
            <label>Account Destination</label>
            <select id="accountType" required>
                <option value="Student Dashboard">Student Dashboard / Buyer</option>
                <option value="Seller Portal">Seller Portal</option>
            </select>
        </div>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter full name" required>
        </div>

        <div class="input-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@domain.com" required>
        </div>

        <div class="input-group">
            <label>PIN Code</label>
            <input type="text" id="pinCode" placeholder="6-digit regional PIN" required>
        </div>

        <div class="input-group">
            <label>Academic Status</label>
            <select id="academicStatus" required>
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
                <option value="Graduate">Graduate</option>
            </select>
        </div>

        <button type="submit" id="submitBtn">Access Platform</button>
    </form>
    <div id="statusMessage" class="status-msg"></div>
</div>

<script>
    const BACKEND_URL = "https://pageloop-backend.onrender.com";

    document.getElementById('accessForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        submitBtn.disabled = true;
        submitBtn.innerText = "Authenticating profile...";
        statusMessage.className = "status-msg";
        statusMessage.innerText = "";

        const payload = {
            accountType: document.getElementById('accountType').value,
            fullName: document.getElementById('fullName').value,
            dob: document.getElementById('dob').value,
            email: document.getElementById('email').value,
            pinCode: document.getElementById('pinCode').value,
            academicStatus: document.getElementById('academicStatus').value
        };

        try {
            const response = await fetch(`${BACKEND_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.success) {
                statusMessage.className = "status-msg success";
                statusMessage.innerText = "Authorized successfully! Redirecting...";
                
                localStorage.setItem('userEmail', data.email);

                // SYSTEM DIRECTORY TRAFFIC DEPLOYMENT ROUTING
                if (data.accountType === "Seller Portal") {
                    if (!data.isPlatformPaid) {
                        setTimeout(() => { window.location.href = "payment.html"; }, 1200);
                    } else {
                        setTimeout(() => { window.location.href = "seller.html"; }, 1200);
                    }
                } else {
                    setTimeout(() => { window.location.href = "buyer.html"; }, 1200);
                }
            } else {
                throw new Error(data.message || "Database profile registration refused.");
            }

        } catch (err) {
            statusMessage.className = "status-msg error";
            statusMessage.innerText = err.message || "Unable to contact secure background microservice.";
            submitBtn.disabled = false;
            submitBtn.innerText = "Access Platform";
        }
    });
</script>
</body>
</html>
