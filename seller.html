<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageLoop - Seller Management Desk</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #1e293b; }
        .dashboard-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { color: #1e1b4b; margin: 0; font-size: 26px; }
        .badge-active { background: #dcfce7; color: #15803d; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .upload-box { background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 8px; padding: 25px; text-align: center; cursor: pointer; transition: border 0.2s; }
        .upload-box:hover { border-color: #4f46e5; }
        .btn-action { background: #4f46e5; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-action:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <div>
            <h1>Seller Material Desk</h1>
            <p id="sellerEmail" style="color: #64748b; margin: 5px 0 0 0; font-size: 14px;"></p>
        </div>
        <span class="badge-active">Profile Status: Active Verified</span>
    </div>

    <h3>List Academic Material</h3>
    <div class="upload-box" id="uploadTrigger">
        <p style="margin: 0 0 10px 0; font-weight: 600; color: #475569;">Drag & Drop Textbooks, Course Materials, or PDF Lecture Notes Here</p>
        <p style="margin: 0; font-size: 12px; color: #94a3b8;">Supports PDF, JPEG, PNG formats (Max 25MB)</p>
    </div>
    
    <div style="margin-top:25px; text-align: right;">
        <button class="btn-action" onclick="alert('Form listing processing module triggered successfully.')">Publish New Listing</button>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', async () => {
        const email = localStorage.getItem('userEmail');
        const BACKEND_URL = "https://pageloop-backend.onrender.com";

        if (!email) {
            alert("Security Intercept: Authentication registry context token missing. Returning to entry page.");
            window.location.href = "login.html";
            return;
        }

        // FIX: Replaced single quotes with backticks for dynamic email string injection
        document.getElementById('sellerEmail').innerText = `Managing Store: ${email}`;

        try {
            const response = await fetch(`${BACKEND_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await response.json();

            // Guardrail redirection check
            if (!data.success || data.accountType !== "Seller Portal" || !data.isPlatformPaid) {
                alert("Security Intercept: Account configuration requires active platform activation fee clearance.");
                window.location.href = "payment.html";
            }
        } catch (err) {
            console.error("Dashboard security state evaluation bypassed/interrupted by engine error.", err);
        }
    });
</script>

</body>
</html>
